# PipeWire user override for resampler, sample rate, and buffer
# Only these settings are changed. All other config loads from system defaults.
# This is safe and will not break module loading.

context.properties = {
    default.clock.rate = 48000                   # Force 48 kHz everywhere
    default.clock.quantum = 512                  # Buffer size (10.7 ms @ 48kHz)
    resample.converter = soxr                    # Use soxr for highest-quality SRC
    resample.quality = 10                        # soxr: highest quality, more CPU
    resample.interpolator = cubic
    resample.fallback = soxr
}

