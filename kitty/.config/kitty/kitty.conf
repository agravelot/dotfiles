# Font configuration
font_family      Maple Mono NF Regular
bold_font        Maple Mono NF Bold
italic_font      Maple Mono NF Italic
bold_italic_font Maple Mono NF Bold Italic
font_size        14

# Show ligatures but reveal actual characters when cursor is over them
disable_ligatures cursor

# Window settings
remember_window_size        no
initial_window_width        950
initial_window_height       500
window_padding_width        6 8
hide_window_decorations     no
confirm_os_window_close     0

# Cursor settings
cursor_shape                block
cursor_blink_interval       0.5
cursor_stop_blinking_after  1

# Scrollback
scrollback_lines            2000
wheel_scroll_min_lines      1

# Tab bar
tab_bar_style               powerline
tab_bar_edge                bottom

# Opacity
background_opacity          1
dynamic_background_opacity  yes

# Selection
selection_foreground        none
selection_background        none

# Shell integration (let shell/editor control cursor)
shell_integration           no-cursor

# Remote control and other settings
allow_remote_control        yes
enable_audio_bell           no
show_hyperlink_targets      yes
update_check_interval       0
macos_option_as_alt         yes

# Keybindings
map f1 launch --type=overlay --copy-env --allow-remote-control /bin/bash -c '~/.config/kitty/picker.sh'

# Font size adjustment
map ctrl+plus       change_font_size all +1
map ctrl+minus      change_font_size all -1
map ctrl+backspace  change_font_size all 0

# Tab management
map ctrl+shift+enter new_tab_with_cwd
map ctrl+shift+q     close_tab
map ctrl+shift+h     previous_tab
map ctrl+shift+l     next_tab

# Clear scrollback
map ctrl+shift+k clear_terminal scrollback active

# Animated cursor follows text
include $HOME/.config/ml4w/settings/kitty-cursor-trail.conf

# Include matugen colors
include colors.conf

# Include Custom Configuration (colors override)
include ./custom.conf

